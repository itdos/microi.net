<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
        :root {
            --status-bar-height: 0px;
            --status-bar-height: constant(safe-area-inset-top);
            --status-bar-height: env(safe-area-inset-top);
        }
        html,body{ 
            margin: 0px;
            padding: 0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background-color: #EDF0F9 !important;
            font-size: 14px !important;
            background-size: 20%;
        }
    </style>
    <link href="/static/css/microi.loading.css?d=20260302" rel="stylesheet" />
    <!-- 微信 JSSDK：支持小程序 WebView 内 H5 与小程序通信 -->
    <script>
      // 仅在小程序 WebView 环境下加载 JSSDK
      if (window.__wxjs_environment === 'miniprogram' || /source=miniprogram/.test(location.search)) {
        document.write('<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"><\/script>');
      }
    </script>
    <title>Loading...</title>
    <script type="text/javascript">
        var OsClient = '';
        var ApiBase = '';
        var FileServer = '';
        var OsClientType = '';
        var ApiCustom = '';
    </script>
    <!-- 5+App (Wap2App) 环境：返回键 + 状态栏高度 -->
    <script>
    (function() {
        function initPlusEnv() {
            if (typeof plus === 'undefined') return;

            // 1. 强制设置 webview 的 backButtonAutoControl 为 none
            try {
                var wv = plus.webview.currentWebview();
                wv.setStyle({ backButtonAutoControl: 'none' });
            } catch(e) {}

            // 2. 状态栏高度 → CSS变量 + 默认深色文字（大部分页面白色头部）
            try {
                plus.navigator.setStatusBarStyle('dark');
            } catch(e) {}
            try {
                var h = plus.navigator.getStatusbarHeight();
                if (h > 0) {
                    document.documentElement.style.setProperty('--status-bar-height', h + 'px');
                }
            } catch(e) {}

            // 3. 返回键处理
            var _lastBack = 0;
            function handleBackButton() {
                // Vue 应用 mounted 后会设置 window.__microi_handleBack
                // 由 App.vue 注册，读取 permission.js afterEach 设置的 __microi_isRootPage 标志
                if (typeof window.__microi_handleBack === 'function') {
                    window.__microi_handleBack();
                    return;
                }
                // Vue 尚未 mount 时的降级处理
                if (window.__microi_isRootPage === false) { window.history.back(); return; }
                if (window.__microi_isRootPage === true) {
                    var now2 = Date.now();
                    if (now2 - _lastBack < 2000) { plus.runtime.quit(); return; }
                    _lastBack = now2;
                    plus.nativeUI.toast('再按一次退出应用', { duration: 'short' }); return;
                }
                // 完全未初始化时降级
                try {
                    var pos = window.history.state && window.history.state.position;
                    if (typeof pos === 'number' && pos > 0) { window.history.back(); return; }
                } catch(e) {}
                var now = Date.now();
                if (now - _lastBack < 2000) {
                    plus.runtime.quit();
                } else {
                    _lastBack = now;
                    plus.nativeUI.toast('再按一次退出应用', { duration: 'short' });
                }
            }

            // plus.key —— 5+App/Wap2App 官方返回键 API
            try {
                plus.key.addEventListener('backbutton', handleBackButton, false);
            } catch(e) {}
            // document 监听作为备份
            document.addEventListener('backbutton', function(e) {
                e.preventDefault && e.preventDefault();
                e.stopPropagation && e.stopPropagation();
                handleBackButton();
            }, false);
        }

        if (window.plus) {
            initPlusEnv();
        } else {
            document.addEventListener('plusready', initPlusEnv, false);
        }
    })();
    </script>
</head>
<body class="microi Classic">
    <div id="microi_loading">
        <div class="ml-stars" id="ml_stars"></div>
        <div class="ml-splash">
            <div class="ml-logo-ring"><div class="ml-logo-core">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div></div>
            <div class="ml-title" id="appTitle">Loading...</div>
            <div class="ml-subtitle">正在加载资源</div>
            <div class="ml-percent" id="loadPercent">0%</div>
            <div class="ml-progress-wrap"><div class="ml-progress-bar" id="progressBar"></div></div>
            <div class="ml-info speed" id="loadSpeed">正在加载资源...</div>
            <div class="ml-info" id="loadSize"></div>
            <div class="ml-dots" id="loadDots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="ml-url" id="serverUrl"></div>
            <div class="ml-watermark" id="watermark">Powered by Loading...</div>
        </div>
    </div>
    <script>
      (function() {
        try {
          // 读取 SysConfig 缓存，更新标题和公司名
          var data = JSON.parse(localStorage.getItem('microi.net') || '{}');
          var cfg = data.SysConfig;
          if (cfg) {
            if (cfg.SysTitle) {
              document.title = cfg.SysTitle;
              var t = document.getElementById('appTitle');
              if (t) t.textContent = cfg.SysTitle;
            }
            if (cfg.CompanyName) {
              var w = document.getElementById('watermark');
              if (w) w.textContent = 'Powered by ' + cfg.CompanyName;
            }
          }
        } catch(e) {}
        try {
          // 生成星空粒子
          var starsEl = document.getElementById('ml_stars');
          if (starsEl) {
            for (var i = 0; i < 60; i++) {
              var s = document.createElement('div');
              s.className = 'ml-star';
              var sz = Math.random() * 2.5 + 0.5;
              s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;' +
                'left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%;' +
                '--dur:' + (Math.random() * 3 + 2) + 's;animation-delay:' + (Math.random() * 3) + 's;';
              starsEl.appendChild(s);
            }
          }
          // 5+App (APK)：标记起始进度为20%（与 hbuilder-app 加载页衔接），并显示当前服务器地址
          if (window.plus || navigator.userAgent.indexOf('Html5Plus') > -1) {
            window.__microi_apk_start = 20;
            var pe = document.getElementById('loadPercent');
            var pb = document.getElementById('progressBar');
            if (pe) pe.textContent = '20%';
            if (pb) pb.style.width = '20%';
            // 标记 APK 模式，激活 ml-url 显示
            var loadEl = document.getElementById('microi_loading');
            if (loadEl) loadEl.classList.add('is-apk');
            // 显示当前访问地址（即 hbuilder-app 跳转过来的服务器地址）
            var urlEl = document.getElementById('serverUrl');
            if (urlEl) urlEl.textContent = window.location.href;
          }
          // 小程序 webview 模式下隐藏 loading
          var href = location.href || '';
          var hash = location.hash || '';
          var search = location.search || '';
          var isMini = window.__wxjs_environment === 'miniprogram'
            || /source=(wx-miniprogram|alipay-miniprogram|tt-miniprogram|lark-miniprogram|xhs-miniprogram|miniprogram)/.test(hash)
            || /source=(wx-miniprogram|alipay-miniprogram|tt-miniprogram|lark-miniprogram|xhs-miniprogram|miniprogram)/.test(search)
            || /source=(wx-miniprogram|alipay-miniprogram|tt-miniprogram|lark-miniprogram|xhs-miniprogram|miniprogram)/.test(href)
            || /hideTabBar=1/.test(hash)
            || /hideTabBar=1/.test(search);
          if (isMini) {
            var el = document.getElementById('microi_loading');
            if (el) { el.style.display = 'none'; el.remove(); }
          }
        } catch(e) {}
      })();
    </script>
    <div id="app_microi"></div>
    <script src="/static/js/microi.loading.js?d=20260302" type="text/javascript"></script>
    <!-- Vite 入口 -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
