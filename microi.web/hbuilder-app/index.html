<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>supOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #EDF0F9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #666;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #409EFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #999; }
    </style>
</head>
<body>
    <div id="app-loading" class="loading-container">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载...</div>
    </div>
    <script>
        /**
         * Microi吾码 - 5+App (HBuilder APK) 入口
         * 
         * 工作模式：
         *   模式A（推荐）：加载远程服务器地址（在线模式）
         *   模式B：加载本地 dist 目录构建产物（离线模式）
         * 
         * 使用方法：
         *   修改下方 APP_CONFIG.serverUrl 为你的实际服务器地址
         */
        var APP_CONFIG = {
            // ============================================
            // 【重要】请修改为你的实际服务器地址
            // ============================================
            serverUrl: 'https://mes-new.renyikj.cn/',

            // 是否使用本地模式（加载 dist 目录的构建产物）
            // true = 离线模式（需要将 dist 产物复制到 hbuilder-app/dist/ 目录下）
            // false = 在线模式（加载远程服务器地址，推荐）
            useLocalMode: false,

            // 本地模式的入口文件路径
            localEntry: 'dist/index.html'
        };

        // ===== 5+App 初始化 =====
        document.addEventListener('plusready', function () {
            console.log('[supOS App] plusready fired, plus.os.name=' + plus.os.name);

            // 隐藏loading
            var loading = document.getElementById('app-loading');
            if (loading) loading.style.display = 'none';

            // 设置状态栏
            try {
                plus.navigator.setStatusBarStyle('dark');
                plus.navigator.setStatusBarBackground('#FFFFFF');
            } catch (e) {}

            if (APP_CONFIG.useLocalMode) {
                // === 模式B：本地模式 ===
                // 通过 WebView 加载本地 dist/index.html
                var localUrl = plus.io.convertLocalFileSystemURL('_www/' + APP_CONFIG.localEntry);
                window.location.href = localUrl;
            } else {
                // === 模式A：在线模式（推荐） ===
                // 创建新 WebView 加载远程地址
                var webview = plus.webview.create(APP_CONFIG.serverUrl, 'main', {
                    // WebView 配置
                    plusrequire: 'ahead',        // 提前注入 plus API
                    titleNView: false,             // 不使用原生标题栏
                    bounce: 'none',                // 禁用回弹效果
                    popGesture: 'none',            // 首页禁用侧滑返回
                    render: 'always',              // 始终渲染
                    webviewBGTransparent: false,
                    kernel: 'WKWebview',           // iOS使用WKWebView
                    'uni-app': 'none',             // 非uni-app模式
                    // 缓存策略
                    cachemode: 'default',
                    // 允许混合内容（http+https）
                    allowsInlineMediaPlayback: true,
                    mediaPlaybackRequiresUserAction: false
                });

                // 监听 WebView 加载完成
                webview.addEventListener('loaded', function () {
                    console.log('[supOS App] Remote WebView loaded');
                    // 显示并关闭启动页
                    webview.show('fade-in', 300, function () {
                        plus.navigator.closeSplashscreen();
                    });
                });

                // 监听加载错误
                webview.addEventListener('error', function (e) {
                    console.error('[supOS App] WebView error:', e.message);
                    // 网络错误时提示
                    plus.nativeUI.confirm('网络连接失败，请检查网络设置后重试', function (event) {
                        if (event.index === 0) {
                            webview.loadURL(APP_CONFIG.serverUrl);
                        } else {
                            plus.runtime.quit();
                        }
                    }, 'supOS', ['重试', '退出']);
                });
            }
        }, false);

        // 处理 Android 返回键
        document.addEventListener('backbutton', function () {
            var webview = plus.webview.getWebviewById('main');
            if (webview && webview.canBack()) {
                webview.back();
            } else {
                // 双击退出确认
                if (!window.__backPressed) {
                    window.__backPressed = true;
                    plus.nativeUI.toast('再按一次退出应用');
                    setTimeout(function () { window.__backPressed = false; }, 2000);
                } else {
                    plus.runtime.quit();
                }
            }
        }, false);
    </script>
</body>
</html>
