<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 【配置项】请修改为你的实际服务器地址 -->
    <script>var MICROI_SERVER_URL = 'https://mes-new.renyikj.cn';</script>
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1040 40%, #0d1f4a 70%, #0a0e27 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            padding: 0px;
        }

        /* ===== 星空背景粒子 ===== */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.15; transform: scale(0.8); }
            100% { opacity: 0.9; transform: scale(1.2); }
        }

        /* ===== 主容器 ===== */
        .splash {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100%;
            padding: 40px 30px;
        }

        /* ===== Logo 脉冲圆环 ===== */
        .logo-ring { position: relative; width: 96px; height: 96px; margin-bottom: 32px; }
        .logo-ring::before, .logo-ring::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 96px; height: 96px; border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .logo-ring::before {
            border: 2px solid rgba(99, 145, 255, 0.3);
            animation: ringPulse 2s ease-out infinite;
        }
        .logo-ring::after {
            border: 1.5px solid rgba(99, 145, 255, 0.15);
            animation: ringPulse 2s ease-out infinite 0.6s;
        }
        @keyframes ringPulse {
            0% { width: 96px; height: 96px; opacity: 1; }
            100% { width: 160px; height: 160px; opacity: 0; }
        }
        .logo-core {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #4f7bf7 0%, #7c5cfc 50%, #a855f7 100%);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(79, 123, 247, 0.4), 0 0 60px rgba(124, 92, 252, 0.2);
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-6px); }
        }
        .logo-core svg { width: 40px; height: 40px; fill: #fff; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

        /* ===== 文字区 ===== */
        .app-title {
            font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 2px;
            margin-bottom: 8px; text-shadow: 0 2px 20px rgba(99, 145, 255, 0.5);
        }
        .app-subtitle {
            font-size: 13px; color: rgba(255,255,255,0.45);
            margin-bottom: 20px; letter-spacing: 1px;
        }

        /* ===== 加载百分比 ===== */
        .load-percent {
            font-size: 42px; font-weight: 700; color: #fff;
            letter-spacing: 4px; margin-bottom: 12px;
            text-shadow: 0 2px 20px rgba(99, 145, 255, 0.5);
            animation: percentPulse 1.5s ease-in-out infinite;
            min-height: 52px; line-height: 52px;
        }
        @keyframes percentPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        /* ===== 进度条 ===== */
        .progress-wrap {
            width: 220px; height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px; overflow: hidden; margin-bottom: 16px;
        }
        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #4f7bf7, #a855f7);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* ===== 加载信息 ===== */
        .load-info {
            font-size: 12px; color: rgba(255,255,255,0.45);
            margin-bottom: 4px; letter-spacing: 0.5px;
            min-height: 20px; line-height: 20px; text-align: center;
        }
        .load-info.speed {
            font-size: 13px; color: rgba(255,255,255,0.55);
        }

        /* ===== 圆点加载动画 ===== */
        .load-dots {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin: 16px 0 12px;
        }
        .load-dots .dot {
            width: 10px; height: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite both;
            box-shadow: 0 1px 4px rgba(99, 145, 255, 0.3);
        }
        .load-dots .dot:nth-child(1) { animation-delay: -0.32s; }
        .load-dots .dot:nth-child(2) { animation-delay: -0.16s; }
        .load-dots .dot:nth-child(3) { animation-delay: 0s; }
        .load-dots .dot:nth-child(4) { animation-delay: 0.16s; }
        .load-dots .dot:nth-child(5) { animation-delay: 0.32s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== serverUrl ===== */
        .server-url {
            font-size: 10px; color: rgba(255,255,255,0.25);
            word-break: break-all; text-align: center; max-width: 85vw;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            margin-top: 4px;
        }

        /* ===== 错误态 ===== */
        .error-panel { display: none; flex-direction: column; align-items: center; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .error-icon {
            width: 56px; height: 56px; margin-bottom: 16px; border-radius: 50%;
            background: rgba(239, 68, 68, 0.15);
            display: flex; align-items: center; justify-content: center;
        }
        .error-icon svg { width: 28px; height: 28px; fill: #ef4444; }
        .error-msg { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 20px; text-align: center; }
        .retry-btn {
            padding: 10px 36px; border: none;
            background: linear-gradient(135deg, #4f7bf7, #7c5cfc);
            color: #fff; font-size: 14px; border-radius: 24px; cursor: pointer;
            box-shadow: 0 4px 16px rgba(79, 123, 247, 0.4);
            appearance: none; -webkit-appearance: none; transition: transform 0.15s;
        }
        .retry-btn:active { transform: scale(0.95); }

        /* ===== 底部水印 ===== */
        .watermark {
            position: fixed; bottom: 20px; left: 0; right: 0;
            text-align: center; font-size: 10px; color: rgba(255,255,255,0.12); z-index: 1;
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <div class="splash" id="splash">
        <!-- Logo -->
        <div class="logo-ring">
            <div class="logo-core">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
        </div>

        <!-- 标题 -->
        <div class="app-title" id="appTitle">Loading...</div>
        <div class="app-subtitle">正在启动应用</div>

        <!-- 加载百分比 -->
        <div class="load-percent" id="loadPercent">0%</div>

        <!-- 进度条 -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 加载信息 -->
        <div class="load-info speed" id="loadSpeed">正在初始化...</div>
        <div class="load-info" id="loadSize"></div>

        <!-- 圆点动画 -->
        <div class="load-dots" id="loadDots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- 服务器地址 -->
        <div class="server-url" id="serverUrl"></div>

        <!-- 错误面板 -->
        <div class="error-panel" id="errorPanel">
            <div class="error-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <div class="error-msg" id="errorMsg">网络连接失败</div>
            <button class="retry-btn" onclick="retryLoad()">重新连接</button>
        </div>
    </div>

    <div class="watermark" id="watermark">Powered by Loading...</div>

    <script>
        /**
         * Microi吾码 - 5+App (HBuilder APK) 入口
         *
         * 【核心架构】: location.replace 直接跳转模式
         * 不再使用子 WebView，而是将 launcher webview 直接导航到远程地址。
         * 这样远程页面运行在 launcher webview 中，manifest.json 配置的：
         *   - plusrequire: 'ahead'         → window.plus 在远程页面可用
         *   - backButtonAutoControl: 'none' → backbutton 事件正常派发
         * 从根本上解决了子 WebView 中 backbutton 事件不可靠的问题。
         *
         * 返回键处理在 microi.web/index.html 中实现（远程页面自己处理）。
         */

        // ===== 生成星空粒子 =====
        (function() {
            var c = document.getElementById('stars');
            for (var i = 0; i < 60; i++) {
                var s = document.createElement('div');
                s.className = 'star';
                var size = Math.random() * 2.5 + 0.5;
                s.style.cssText = 'width:' + size + 'px;height:' + size + 'px;' +
                    'left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%;' +
                    '--dur:' + (Math.random() * 3 + 2) + 's;' +
                    'animation-delay:' + (Math.random() * 3) + 's;';
                c.appendChild(s);
            }
        })();

        // ===== 读取 SysConfig 缓存，更新标题和公司名 =====
        (function() {
            try {
                var data = JSON.parse(localStorage.getItem('microi.net') || '{}');
                var cfg = data.SysConfig;
                if (cfg) {
                    if (cfg.SysTitle) {
                        document.title = cfg.SysTitle;
                        var t = document.getElementById('appTitle');
                        if (t) t.textContent = cfg.SysTitle;
                    }
                    if (cfg.CompanyName) {
                        var w = document.getElementById('watermark');
                        if (w) w.textContent = 'Powered by ' + cfg.CompanyName;
                    }
                }
            } catch(e) {}
        })();

        // ===== 配置 =====
        var APP_CONFIG = {
            serverUrl: MICROI_SERVER_URL,
            plusReadyTimeout: 5000
        };

        var _state = { plusReady: false, redirected: false, retryCount: 0 };

        function _log(msg) { console.log('[supOS] ' + msg); }

        // ===== 显示 serverUrl =====
        (function() {
            try { document.getElementById('serverUrl').textContent = APP_CONFIG.serverUrl; } catch(e) {}
        })();

        // ===== 模拟加载进度动画 =====
        // 真实的资源加载发生在 location.replace 之后，
        // 此处通过模拟进度给用户视觉反馈
        var _loadAnim = (function() {
            var percentEl = document.getElementById('loadPercent');
            var speedEl = document.getElementById('loadSpeed');
            var sizeEl = document.getElementById('loadSize');
            var barEl = document.getElementById('progressBar');
            var percent = 0;
            var fakeTotal = 9.2; // MB（估算的前端资源大小）
            var timer = null;
            var running = false;

            function tick() {
                if (percent < 10) percent += Math.random() * 3 + 1;
                else if (percent < 20) percent += Math.random() * 1.5 + 0.3;
                if (percent > 20) percent = 20;
                var p = Math.floor(percent);
                if (percentEl) percentEl.textContent = p + '%';
                if (barEl) barEl.style.width = p + '%';
                // 模拟速度
                var speed = (Math.random() * 700 + 350).toFixed(0);
                if (speedEl) speedEl.textContent = '速度: ' + speed + ' KB/s';
                // 模拟已加载大小
                var loaded = (fakeTotal * percent / 100).toFixed(2);
                if (sizeEl) sizeEl.textContent = loaded + ' MB / ' + fakeTotal.toFixed(2) + ' MB';
            }

            return {
                start: function() {
                    if (running) return;
                    running = true;
                    timer = setInterval(tick, 200);
                },
                finish: function() {
                    clearInterval(timer); running = false;
                    percent = 100;
                    if (percentEl) percentEl.textContent = '100%';
                    if (barEl) barEl.style.width = '100%';
                    if (speedEl) speedEl.textContent = '正在进入应用...';
                    if (sizeEl) sizeEl.textContent = fakeTotal.toFixed(2) + ' MB / ' + fakeTotal.toFixed(2) + ' MB';
                },
                stop: function() {
                    clearInterval(timer); running = false;
                },
                reset: function() {
                    clearInterval(timer); running = false;
                    percent = 0;
                    if (percentEl) percentEl.textContent = '0%';
                    if (barEl) barEl.style.width = '0%';
                    if (speedEl) speedEl.textContent = '正在初始化...';
                    if (sizeEl) sizeEl.textContent = '';
                }
            };
        })();

        // ===== UI 控制 =====
        function _updateStatus(text) {
            try { document.getElementById('loadSpeed').textContent = text; } catch(e) {}
        }

        function _showError(msg) {
            _loadAnim.stop();
            try {
                document.getElementById('progressWrap').style.display = 'none';
                document.getElementById('loadPercent').style.display = 'none';
                document.getElementById('loadSpeed').style.display = 'none';
                document.getElementById('loadSize').style.display = 'none';
                document.getElementById('loadDots').style.display = 'none';
                document.getElementById('errorMsg').textContent = msg || '网络连接失败';
                document.getElementById('errorPanel').style.display = 'flex';
            } catch(e) {}
        }

        function _resetUI() {
            _loadAnim.reset();
            try {
                document.getElementById('progressWrap').style.display = '';
                document.getElementById('loadPercent').style.display = '';
                document.getElementById('loadSpeed').style.display = '';
                document.getElementById('loadSize').style.display = '';
                document.getElementById('loadDots').style.display = '';
                document.getElementById('errorPanel').style.display = 'none';
            } catch(e) {}
        }

        // ===== 检测网络 =====
        function _checkNetwork() {
            try {
                if (window.plus && plus.networkinfo) {
                    var t = plus.networkinfo.getCurrentType();
                    if (t === 0 || t === plus.networkinfo.CONNECTION_NONE) return false;
                }
            } catch(e) {}
            return true;
        }

        // ===== 核心：跳转到远程页面 =====
        // 使用 location.replace() 直接导航 launcher webview
        // 跳转后远程页面继承 manifest 中 launchwebview 的全部配置
        function navigateToApp() {
            if (_state.redirected) return;
            _state.redirected = true;
            _log('跳转到: ' + APP_CONFIG.serverUrl);
            _loadAnim.stop();
            // 确保显示20%（与 index.html 加载页衔接）
            try {
                document.getElementById('loadPercent').textContent = '20%';
                document.getElementById('progressBar').style.width = '20%';
                document.getElementById('loadSpeed').textContent = '正在进入应用...';
            } catch(e) {}
            setTimeout(function() {
                location.replace(APP_CONFIG.serverUrl);
            }, 300);
        }

        // ===== 重试 =====
        function retryLoad() {
            _state.retryCount++;
            if (_state.retryCount > 5) {
                _state.redirected = false;
                navigateToApp();
                return;
            }
            _state.redirected = false;
            _resetUI();
            setTimeout(function() { startLoad(); }, 500);
        }

        // ===== 启动加载 =====
        function startLoad() {
            if (!_checkNetwork()) {
                _showError('无网络连接，请检查网络设置');
                return;
            }
            _updateStatus('正在连接服务器...');
            _loadAnim.start();
            var xhr = new XMLHttpRequest();
            xhr.open('HEAD', APP_CONFIG.serverUrl, true);
            xhr.timeout = 10000;
            xhr.onload = function() {
                _log('服务器可达');
                navigateToApp();
            };
            xhr.onerror = function() {
                // CORS 可能导致 XHR 失败但页面实际可加载，直接跳转
                _log('XHR error，尝试直接跳转');
                navigateToApp();
            };
            xhr.ontimeout = function() {
                _showError('连接服务器超时，请检查网络');
            };
            xhr.send();
        }

        // ===== 初始化 5+App =====
        function initApp() {
            if (_state.plusReady) return;
            _state.plusReady = true;

            try { _log('initApp, OS=' + plus.os.name); } catch(e) {}

            try { plus.navigator.closeSplashscreen(); } catch(e) {}
            try {
                plus.navigator.setStatusBarStyle('light');
                plus.navigator.setStatusBarBackground('#0a0e27');
            } catch(e) {}

            startLoad();
        }

        // ===== 多层启动兜底 =====
        document.addEventListener('plusready', function() {
            _log('plusready');
            initApp();
        }, false);

        setTimeout(function() {
            if (!_state.plusReady && typeof window.plus === 'object') {
                _log('plus 已存在，主动初始化');
                initApp();
            }
        }, 300);

        setTimeout(function() {
            if (!_state.plusReady) {
                if (typeof window.plus === 'object') {
                    initApp();
                } else {
                    _log('非 5+App 环境，直接跳转');
                    navigateToApp();
                }
            }
        }, APP_CONFIG.plusReadyTimeout);

        // ===== Android 返回键处理（仅在 loading 页面生效） =====
        // 跳转后此监听器会被销毁，远程页面自行处理返回键
        try {
            plus.key.addEventListener('backbutton', function() {
                try { plus.runtime.quit(); } catch(e) {}
            }, false);
        } catch(e) {}
        document.addEventListener('backbutton', function() {
            try { plus.runtime.quit(); } catch(e) {}
        }, false);
    </script>
</body>
</html>
