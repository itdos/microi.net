<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>supOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #EDF0F9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #666;
            position: relative;
            z-index: 9999;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #409EFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #999; }
        .loading-error { display: none; margin-top: 20px; text-align: center; }
        .loading-error .error-text { font-size: 14px; color: #e74c3c; margin-bottom: 12px; }
        .loading-retry {
            padding: 8px 24px;
            border: 1px solid #409EFF;
            border-radius: 20px;
            color: #409EFF;
            font-size: 14px;
            background: none;
            -webkit-appearance: none;
        }
        .loading-retry:active { background: #409EFF; color: #fff; }
        .loading-server-url {
            margin-top: 12px;
            padding: 6px 14px;
            background: #f0f4ff;
            border: 1px solid #d0deff;
            border-radius: 8px;
            font-size: 11px;
            color: #4a6fa5;
            word-break: break-all;
            text-align: center;
            max-width: 90vw;
        }
        .loading-server-url .url-label {
            color: #888;
            margin-right: 4px;
        }
        .loading-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(30,30,30,0.88);
            padding: 8px 10px;
            max-height: 160px;
            overflow-y: auto;
            font-size: 10px;
            line-height: 1.6;
            color: #ccc;
            word-break: break-all;
        }
        .loading-log .log-line {
            display: block;
            padding: 1px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .loading-log .log-line:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div id="app-loading" class="loading-container">
        <div class="loading-spinner" id="loading-spinner"></div>
        <div class="loading-text" id="loading-text">正在加载...</div>
        <div class="loading-server-url" id="loading-server-url">
            <span class="url-label">访问地址：</span><span id="loading-server-url-val"></span>
        </div>
        <div class="loading-error" id="loading-error">
            <div class="error-text" id="error-text">网络连接失败</div>
            <button class="loading-retry" onclick="retryLoad()">点击重试</button>
        </div>
    </div>
    <div class="loading-log" id="loading-log"></div>
    <script>
        /**
         * Microi吾码 - 5+App (HBuilder APK) 入口
         *
         * 工作模式：
         *   模式A（推荐）：加载远程服务器地址（在线模式）
         *   模式B：加载本地 dist 目录构建产物（离线模式）
         *
         * 架构说明：
         *   多层兜底策略确保不会卡死在 loading 界面：
         *     Layer 1 - plusready 事件触发正常流程
         *     Layer 2 - plusready 超时检测，plus 对象可能已就绪但事件未触发
         *     Layer 3 - WebView loaded 事件 → 显示远程页面
         *     Layer 4 - WebView 加载超时 → 强制显示
         *     Layer 5 - 终极兜底 → 直接 location.href 跳转远程地址
         */
        var APP_CONFIG = {
            // ============================================
            // 【重要】请修改为你的实际服务器地址
            // ============================================
            // serverUrl: 'https://mes-new.renyikj.cn/',
            serverUrl: 'http://192.168.0.4:1988/',

            // 是否使用本地模式（加载 dist 目录的构建产物）
            // true = 离线模式（需要将 dist 产物复制到 hbuilder-app/dist/ 目录下）
            // false = 在线模式（加载远程服务器地址，推荐）
            useLocalMode: false,

            // 本地模式的入口文件路径
            localEntry: 'dist/index.html',

            // 远程加载超时（毫秒），超时后强制显示 WebView
            loadTimeout: 12000,

            // plusready 事件等待超时（毫秒），超时后启动备用方案
            plusReadyTimeout: 5000,

            // 终极兜底超时（毫秒），超时后直接跳转远程地址
            ultimateTimeout: 20000
        };

        // ===== 应用状态 =====
        var _state = {
            plusReady: false,       // plusready 是否已触发
            webviewCreated: false,  // WebView 是否创建成功
            shown: false,           // 远程内容是否已显示
            mainWebview: null,      // 远程 WebView 实例引用
            retryCount: 0           // 重试次数
        };

        // ===== 页面加载完成后立即显示 serverUrl =====
        (function () {
            try {
                var el = document.getElementById('loading-server-url-val');
                if (el) el.textContent = APP_CONFIG.serverUrl;
            } catch (e) {}
        })();

        // ===== 诊断日志（多行追加，显示在底部） =====
        function _log(msg) {
            var ts = new Date().toTimeString().substr(0, 8);
            var full = '[' + ts + '] ' + msg;
            console.log('[supOS] ' + msg);
            try {
                var el = document.getElementById('loading-log');
                if (el) {
                    var line = document.createElement('span');
                    line.className = 'log-line';
                    line.textContent = full;
                    el.appendChild(line);
                    // 自动滚动到最新一条
                    el.scrollTop = el.scrollHeight;
                }
            } catch (e) {}
        }

        // ===== 更新 loading 状态文字 =====
        function _updateStatus(text) {
            try {
                var el = document.getElementById('loading-text');
                if (el) el.textContent = text;
            } catch (e) {}
        }

        // ===== 显示加载错误 =====
        function _showError(msg) {
            _state.shown = false;
            try {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('error-text').textContent = msg || '网络连接失败';
                document.getElementById('loading-error').style.display = 'block';
            } catch (e) {}
        }

        // ===== 重置 loading 界面（用于重试） =====
        function _resetLoadingUI() {
            try {
                document.getElementById('loading-error').style.display = 'none';
                document.getElementById('loading-spinner').style.display = 'block';
                document.getElementById('loading-text').style.display = 'block';
                document.getElementById('loading-text').textContent = '正在加载...';
            } catch (e) {}
        }

        // ===== 终极兜底：直接跳转远程地址 =====
        function _fallbackRedirect() {
            _log('Fallback → 直接跳转: ' + APP_CONFIG.serverUrl);
            try {
                var el = document.getElementById('app-loading');
                if (el) el.style.display = 'none';
                var logEl = document.getElementById('loading-log');
                if (logEl) logEl.style.display = 'none';
            } catch (e) {}
            window.location.href = APP_CONFIG.serverUrl;
        }

        // ===== 检测网络状态 =====
        function _checkNetwork() {
            try {
                if (window.plus && plus.networkinfo) {
                    var type = plus.networkinfo.getCurrentType();
                    // CONNECTION_NONE = 0
                    if (type === 0 || type === plus.networkinfo.CONNECTION_NONE) {
                        return false;
                    }
                }
            } catch (e) {}
            return true; // 默认认为有网络（检测失败不应阻止加载）
        }

        /**
         * 显示远程 WebView（多重保护，只执行一次）
         */
        function showMainWebview() {
            if (_state.shown) return;
            _state.shown = true;

            _log('显示远程 WebView');

            if (!_state.mainWebview) {
                _log('WebView 不存在，回退到直接跳转');
                _fallbackRedirect();
                return;
            }

            try {
                // 显示远程 WebView 并带到最前面
                _state.mainWebview.show('fade-in', 300);
                _log('WebView.show() 调用成功');
            } catch (e) {
                _log('WebView.show() 失败: ' + e.message);
                _fallbackRedirect();
                return;
            }

            // 延迟隐藏 loading（给 fade-in 动画让时间）
            setTimeout(function () {
                try {
                    var loading = document.getElementById('app-loading');
                    if (loading) loading.style.display = 'none';
                    var logEl = document.getElementById('loading-log');
                    if (logEl) logEl.style.display = 'none';

                    // 同时将 launcher WebView 的背景设为透明
                    // 防止 launcher 仍遮挡 main WebView
                    document.body.style.background = 'transparent';
                    document.documentElement.style.background = 'transparent';
                } catch (e) {}
            }, 350);

            // 额外保护：如果 show() 执行了但页面仍然没有显示（某些设备行为异常）
            // 2秒后检测，如果页面还存在 loading 容器且 body 不透明 → 强制跳转
            setTimeout(function () {
                try {
                    var loading = document.getElementById('app-loading');
                    if (loading && loading.style.display !== 'none') {
                        _log('show() 后 loading 仍然可见，强制跳转');
                        _fallbackRedirect();
                    }
                } catch (e) {}
            }, 2000);
        }

        /**
         * 重试加载远程页面
         */
        function retryLoad() {
            _state.retryCount++;
            _log('重试加载 (第' + _state.retryCount + '次)');

            // 超过 3 次重试直接跳转
            if (_state.retryCount > 3) {
                _log('重试次数超限，直接跳转');
                _fallbackRedirect();
                return;
            }

            _state.shown = false;
            _resetLoadingUI();
            _updateStatus('正在重新加载...');

            // 检查网络
            if (!_checkNetwork()) {
                _showError('无网络连接，请检查网络设置');
                return;
            }

            if (_state.mainWebview) {
                try {
                    _state.mainWebview.loadURL(APP_CONFIG.serverUrl);
                    // 超时兜底
                    setTimeout(function () {
                        if (!_state.shown) showMainWebview();
                    }, APP_CONFIG.loadTimeout);
                } catch (e) {
                    _log('重新加载失败: ' + e.message);
                    _fallbackRedirect();
                }
            } else if (_state.plusReady && window.plus) {
                // 尝试重新创建 WebView
                createRemoteWebview();
            } else {
                _fallbackRedirect();
            }
        }

        /**
         * 创建远程 WebView
         */
        function createRemoteWebview() {
            _log('创建远程 WebView → ' + APP_CONFIG.serverUrl);
            _updateStatus('正在连接服务器...');

            try {
                _state.mainWebview = plus.webview.create(
                    APP_CONFIG.serverUrl,
                    'main',
                    {
                        plusrequire: 'ahead',               // 提前注入 plus API
                        titleNView: false,                  // 不使用原生标题栏
                        bounce: 'none',                     // 禁用回弹效果
                        render: 'always',                   // 始终渲染
                        webviewBGTransparent: false,        // 白色背景（不透明）
                        allowsInlineMediaPlayback: true,
                        mediaPlaybackRequiresUserAction: false,
                        mixed: true,                        // 允许混合内容
                        hardwareAccelerated: true,          // 硬件加速
                        top: '0px',                         // 全屏定位
                        bottom: '0px',
                        kernel: 'WKWebview',                // iOS 使用 WKWebview
                        cachemode: 'default',               // 默认缓存策略
                        errorPage: 'none',                  // 不显示默认错误页
                        backButtonAutoControl: 'none'       // 禁止默认返回行为，由我们注入的 JS 处理
                    }
                );

                _state.webviewCreated = true;
                _log('WebView 创建成功');
            } catch (e) {
                _log('WebView 创建失败: ' + e.message);
                _fallbackRedirect();
                return;
            }

            // 远程页面加载完成 → 显示 + 注入状态栏高度 + 注入返回键处理
            _state.mainWebview.addEventListener('loaded', function () {
                _log('远程页面 loaded 事件触发');
                _updateStatus('页面加载完成');

                // 注入状态栏高度（Android 的 env(safe-area-inset-top) 返回 0，必须通过 JS 注入）
                try {
                    var sbHeight = 0;
                    try { sbHeight = plus.navigator.getStatusbarHeight(); } catch (ex) {}
                    if (sbHeight > 0) {
                        _state.mainWebview.evalJS(
                            'document.documentElement.style.setProperty("--status-bar-height", "' + sbHeight + 'px");'
                        );
                        _log('状态栏高度注入: ' + sbHeight + 'px');
                    } else {
                        _log('状态栏高度获取为 0，跳过注入');
                    }
                } catch (e) {
                    _log('状态栏高度注入失败: ' + e.message);
                }

                // 返回键由 launcher webview 的 backbutton 监听统一处理
                // （5+App 的 backbutton 事件只派发到 launcher webview，不会到子 webview）

                showMainWebview();
            });

            // 加载错误 → 显示错误界面
            _state.mainWebview.addEventListener('error', function (e) {
                var msg = (e && e.message) ? e.message : '未知错误';
                _log('WebView error: ' + msg);
                _showError('网络连接失败，请检查网络');
            });

            // Timeout 1：超时后强制显示 WebView（即使 loaded 还没触发）
            setTimeout(function () {
                if (!_state.shown) {
                    _log('加载超时(' + APP_CONFIG.loadTimeout + 'ms)，强制显示');
                    showMainWebview();
                }
            }, APP_CONFIG.loadTimeout);
        }

        /**
         * 初始化 5+App（只执行一次）
         */
        function initApp() {
            if (_state.plusReady) return;
            _state.plusReady = true;

            var osName = 'unknown';
            try { osName = plus.os.name; } catch (e) {}
            _log('initApp 启动, OS=' + osName);
            _updateStatus('正在初始化...');

            // 关闭启动屏
            try { plus.navigator.closeSplashscreen(); } catch (e) {
                _log('closeSplashscreen 失败: ' + e.message);
            }

            // 设置状态栏
            try {
                plus.navigator.setStatusBarStyle('dark');
                plus.navigator.setStatusBarBackground('#FFFFFF');
            } catch (e) {}

            // === 模式B：本地模式 ===
            if (APP_CONFIG.useLocalMode) {
                _log('本地模式');
                try {
                    var loading = document.getElementById('app-loading');
                    if (loading) loading.style.display = 'none';
                    var localUrl = plus.io.convertLocalFileSystemURL('_www/' + APP_CONFIG.localEntry);
                    window.location.href = localUrl;
                } catch (e) {
                    _log('本地模式失败: ' + e.message);
                    window.location.href = APP_CONFIG.localEntry;
                }
                return;
            }

            // === 模式A：在线模式 ===
            // 检查网络
            if (!_checkNetwork()) {
                _showError('无网络连接，请检查网络设置后重试');
                return;
            }

            // 创建远程 WebView
            createRemoteWebview();
        }

        // ===================================================================
        //  多层启动兜底机制（核心改进）
        // ===================================================================

        // Layer 1：正常的 plusready 事件
        document.addEventListener('plusready', function () {
            _log('plusready 事件触发');
            initApp();
        }, false);

        // Layer 2：plus 对象可能已存在但 plusready 事件错过了
        // （这在某些 HBuilderX 版本或调试模式下可能出现）
        setTimeout(function () {
            if (!_state.plusReady && typeof window.plus === 'object') {
                _log('plus 对象已存在但 plusready 未触发，主动初始化');
                initApp();
            }
        }, 300);

        // Layer 3：plusready 超时等待
        // 如果 5 秒内 plusready 没触发 且 plus 对象也不存在
        setTimeout(function () {
            if (!_state.plusReady) {
                if (typeof window.plus === 'object') {
                    _log('plusready 超时(' + APP_CONFIG.plusReadyTimeout + 'ms)，但 plus 已可用');
                    initApp();
                } else {
                    _log('plusready 超时，plus 不可用 → 可能不在 5+App 环境');
                    _updateStatus('正在跳转...');
                    // 不在 5+App 环境（浏览器中直接打开等），直接跳转
                    _fallbackRedirect();
                }
            }
        }, APP_CONFIG.plusReadyTimeout);

        // Layer 4：终极兜底 - 无论什么原因，20秒后如果还在 loading 就直接跳转
        setTimeout(function () {
            if (!_state.shown) {
                _log('终极兜底超时(' + APP_CONFIG.ultimateTimeout + 'ms)，强制跳转');
                _fallbackRedirect();
            }
        }, APP_CONFIG.ultimateTimeout);

        // ===================================================================
        //  Android 返回键处理（launcher webview 统一处理）
        //  5+App 的 backbutton 事件只会派发到 launcher webview
        //  通过 mainWebview.canBack() / .back() 控制远程页面的导航
        // ===================================================================
        var __backPressed = false;
        function _handleDoubleBackExit() {
            if (!__backPressed) {
                __backPressed = true;
                try { plus.nativeUI.toast('再按一次退出应用'); } catch (ex) {}
                setTimeout(function () { __backPressed = false; }, 2000);
            } else {
                try { plus.runtime.quit(); } catch (ex) {}
            }
        }
        document.addEventListener('backbutton', function () {
            if (_state.mainWebview && _state.shown) {
                // 远程 WebView 已显示，检查是否能后退
                try {
                    _state.mainWebview.canBack(function (e) {
                        if (e.canBack) {
                            _state.mainWebview.back();
                        } else {
                            // 已无更多历史，双击退出
                            _handleDoubleBackExit();
                        }
                    });
                } catch (ex) {
                    // canBack 调用异常，尝试直接 back
                    try { _state.mainWebview.back(); } catch (e) {}
                }
            } else {
                // main webview 不存在或未显示，双击退出
                _handleDoubleBackExit();
            }
        }, false);
    </script>
</body>
</html>
